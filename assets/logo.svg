<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="James Networks">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#152038"/>
      <stop offset="100%" stop-color="#0b1220"/>
    </linearGradient>
  </defs>
  <!-- rounded app-icon plate -->
  <rect x="4" y="4" width="120" height="120" rx="28" fill="url(#bg)"/>
  <!-- network links -->
  <g stroke="#dbeafe" stroke-width="4" stroke-linecap="round" fill="none">
    <!-- outer hexagon -->
    <path d="M64 28 L94 46 L94 82 L64 100 L34 82 L34 46 Z"/>
    <!-- spokes to center -->
    <path d="M64 28 L64 64 M94 46 L64 64 M94 82 L64 64 M64 100 L64 64 M34 82 L64 64 M34 46 L64 64"/>
    <!-- two chords for mesh (not a hollow ring) -->
    <path d="M34 46 L94 46 M34 82 L94 82"/>
  </g>
  <!-- nodes -->
  <g fill="#38bdf8">
    <circle cx="64" cy="28" r="8"/>
    <circle cx="94" cy="46" r="8"/>
    <circle cx="94" cy="82" r="8"/>
    <circle cx="64" cy="100" r="8"/>
    <circle cx="34" cy="82" r="8"/>
    <circle cx="34" cy="46" r="8"/>
    <circle cx="64" cy="64" r="9"/>
  </g>
</svg>
