<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" role="img" aria-label="James Networks">
  <rect width="128" height="128" rx="28" fill="#0b1220"/>

  <!-- Bold geometric J (open hook, solid fill — not a ring) -->
  <path
    fill="#38bdf8"
    d="
      M 46 20
      h 28
      v 58
      c 0 14 -8 22 -22 22
      c -9 0 -15.5 -3.5 -20 -10
      l 15 -13.5
      c 2 3 4.5 4.8 8 4.8
      c 5 0 8 -3 8 -9.5
      V 20
      z
    "
  />

  <!-- Circuit tree growing right from the J stem -->
  <g stroke="#38bdf8" stroke-width="3.25" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- top arm -->
    <path d="M74 36 H94"/>
    <!-- mid hub + three branches -->
    <path d="M74 52 H88"/>
    <path d="M88 52 L102 38"/>
    <path d="M88 52 H104"/>
    <path d="M88 52 L96 72"/>
  </g>

  <!-- Square terminals (network nodes, not circular rings) -->
  <g fill="#38bdf8">
    <rect x="92" y="30" width="12" height="12" rx="2"/>
    <rect x="100" y="32" width="12" height="12" rx="2"/>
    <rect x="102" y="46" width="12" height="12" rx="2"/>
    <rect x="90" y="68" width="12" height="12" rx="2"/>
  </g>
</svg>
